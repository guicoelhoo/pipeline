name: PIPELINE1

on:
  push:
    branches:
      - main


jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar o python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar as dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Gerar artefato ZIP
        run: zip -r pipeline-demo.zip .

      - name: Publicar artefato
        uses: actions/upload-artifact@v4
        with:
          name: codigo-buildado
          path: pipeline-demo.zip

      - name: Teste Python (Unitário)
        run: pytest

  # --- TRECHO INSERIDO E AJUSTADO ---
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Baixar artefato
        uses: actions/download-artifact@v4
        with:
          name: codigo-buildado # Ajustado para bater com o nome gerado no build

      - name: Extrair artefato
        run: unzip pipeline-demo.zip # Ajustado para o nome do arquivo zip real

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Instalar dependências Node
        run: npm install

      - name: Rodar testes Node
        run: npm test
  # ----------------------------------

  deploy:
    runs-on: ubuntu-latest
    needs: test # Alterado para o deploy só rodar se o job 'test' (Node) passar
    environment:
      name: production

    steps:
      - name: Baixar artefato
        uses: actions/download-artifact@v4
        with:
          name: codigo-buildado
      
      - name: Extrair artefato
        run: unzip pipeline-demo.zip

      - name: Simular deploy
        run: echo "Deploy feito com sucesso em produção"