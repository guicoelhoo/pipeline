name: Pipeline Aula 2

on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar testes
        run: pytest

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Simular Deploy
        run: echo "Deploy realizado com sucesso"

  test:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Simular testes
        run: echo "Teste simulado com sucesso"